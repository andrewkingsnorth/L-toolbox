document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

nt-size:14px;font-weight:600;color:#fff;background:#2a7a3f;border:none;padding:11px 20px;border-radius:9px;cursor:pointer;transition:background .15s ease;\" style-hover=\"background:#236534\">Search<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;align-items:center;gap:9px;margin-top:16px;\">\n          <span style=\"font-size:12.5px;color:#8a8772;\">Try:<\u002Fspan>\n          <sc-for list=\"{{ exampleChips }}\" as=\"c\" hint-placeholder-count=\"4\">\n            <button onclick=\"{{ c.apply }}\" style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#00756c;background:#eaf4ef;border:1px solid #d6e9df;padding:5px 11px;border-radius:20px;cursor:pointer;transition:background .15s ease;\" style-hover=\"background:#dcefe8\">{{ c.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:relative;height:420px;\" data-heroart=\"\">\n        <div style=\"position:absolute;inset:0;display:flex;align-items:center;justify-content:center;\">\n          <div style=\"position:absolute;width:340px;height:340px;border:1.5px dashed #c8ddcf;border-radius:50%;animation:lbspin 60s linear infinite;\"><\u002Fdiv>\n          <div style=\"position:absolute;width:230px;height:230px;border:1.5px solid #d8e8df;border-radius:50%;\"><\u002Fdiv>\n          <div style=\"position:absolute;width:120px;height:120px;border-radius:50%;background:linear-gradient(135deg,#2a7a3f,#00B4A6);box-shadow:0 16px 40px rgba(0,180,166,.3);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;color:#fff;font-weight:700;font-size:22px;\">&lt;/&gt;<\u002Fdiv>\n          <div style=\"position:absolute;top:24px;left:46px;width:62px;height:62px;border-radius:50%;background:#00B4A6;box-shadow:0 10px 24px rgba(0,180,166,.25);animation:lbfloat1 7s ease-in-out infinite;\"><\u002Fdiv>\n          <div style=\"position:absolute;bottom:40px;left:18px;width:44px;height:44px;border-radius:50%;background:#2a7a3f;animation:lbfloat2 8s ease-in-out infinite;\"><\u002Fdiv>\n          <div style=\"position:absolute;top:54px;right:30px;width:34px;height:34px;border-radius:50%;background:#fff;border:2px solid #00B4A6;animation:lbfloat2 6s ease-in-out infinite;\"><\u002Fdiv>\n          <div style=\"position:absolute;bottom:60px;right:40px;width:74px;height:74px;border-radius:18px;background:#fff;border:1.5px solid #bfeae4;box-shadow:0 10px 24px rgba(0,180,166,.14);display:flex;align-items:center;justify-content:center;font-size:26px;color:#00B4A6;animation:lbfloat1 9s ease-in-out infinite;\">▤<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fsc-if>\n\n  <!-- ===================== HERO B ===================== -->\n  <sc-if value=\"{{ isB }}\" hint-placeholder-val=\"{{ false }}\">\n    <section style=\"position:relative;overflow:hidden;background:linear-gradient(135deg,#1f5130 0%,#2a7a3f 52%,#0f8a7e 100%);color:#fff;padding:clamp(48px,7vw,96px) clamp(18px,5vw,56px) clamp(56px,7vw,104px);\" data-hero=\"\">\n      <div style=\"position:absolute;top:-80px;right:-60px;width:360px;height:360px;border:1.5px dashed rgba(255,255,255,.18);border-radius:50%;animation:lbspin 70s linear infinite;\"><\u002Fdiv>\n      <div style=\"position:relative;z-index:2;max-width:780px;\">\n        <div style=\"display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:600;letter-spacing:.04em;color:#d7f3ea;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);padding:6px 13px;border-radius:30px;margin-bottom:24px;\">MSCA Doctoral Network · Movement Behaviour Analysis<\u002Fdiv>\n        <h1 style=\"font-family:Syne,sans-serif;font-weight:800;font-size:clamp(42px,6.8vw,80px);line-height:1.1;letter-spacing:-.02em;margin-bottom:22px;\">Discover the LABDA Toolbox<\u002Fh1>\n        <p style=\"font-size:clamp(16px,1.6vw,20px);line-height:1.55;color:#e6f4ee;max-width:600px;margin-bottom:34px;\">A curated catalog of code tools and resources for movement behaviour analysis — built by Fellows, linked to live repositories and reading.<\u002Fp>\n        <div style=\"display:flex;align-items:center;gap:10px;background:#fff;border-radius:15px;padding:8px 9px 8px 17px;max-width:600px;box-shadow:0 18px 50px rgba(0,0,0,.22);\">\n          <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#8a9389\" stroke-width=\"2.2\" style=\"flex:none;\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><line x1=\"16.5\" y1=\"16.5\" x2=\"21\" y2=\"21\" stroke-linecap=\"round\"><\u002Fline><\u002Fsvg>\n          <input type=\"text\" value=\"{{ query }}\" oninput=\"{{ onSearchInput }}\" onkeydown=\"{{ onSearchKey }}\" placeholder=\"Search tools, resources, authors, tags…\" style=\"flex:1;border:none;outline:none;font-family:Inter,sans-serif;font-size:15.5px;color:#2d3748;background:transparent;min-width:0;\">\n          <button onclick=\"{{ goToResults }}\" style=\"font-family:Inter,sans-serif;font-size:14.5px;font-weight:600;color:#fff;background:#00B4A6;border:none;padding:12px 24px;border-radius:10px;cursor:pointer;transition:background .15s ease;\" style-hover=\"background:#019a8e\">Search<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fsc-if>\n\n  <!-- ===================== SEARCH RESULTS BAR ===================== -->\n  <sc-if value=\"{{ searching }}\" hint-placeholder-val=\"{{ false }}\">\n    <section id=\"search-results\" style=\"padding:clamp(24px,3.4vw,40px) clamp(18px,5vw,56px) 4px;border-top:1px solid #e6e0d2;\">\n      <div style=\"display:flex;align-items:center;gap:14px;flex-wrap:wrap;\">\n        <h2 style=\"font-family:Syne,sans-serif;font-weight:700;font-size:clamp(19px,2.2vw,25px);color:#1f5130;\">{{ resultLabel }}<\u002Fh2>\n        <button onclick=\"{{ clearSearch }}\" style=\"display:inline-flex;align-items:center;gap:6px;font-family:Inter,sans-serif;font-size:13px;font-weight:600;color:#2a7a3f;background:#eaf4ef;border:1px solid #cfe6df;padding:7px 14px;border-radius:22px;cursor:pointer;transition:background .15s ease;\" style-hover=\"background:#dcefe8\">Clear search ✕<\u002Fbutton>\n      <\u002Fdiv>\n      <sc-if value=\"{{ noResults }}\" hint-placeholder-val=\"{{ false }}\">\n        <p style=\"font-size:14.5px;line-height:1.6;color:#5a6472;margin-top:14px;max-width:560px;\">Nothing matches that term. Try a different keyword — an author, a tag, a language (“Python”) or a method (“ENMO”) — or clear the search to browse everything.<\u002Fp>\n      <\u002Fsc-if>\n    <\u002Fsection>\n  <\u002Fsc-if>\n\n  <!-- ===================== ABOUT LABDA (intro) ===================== -->\n  <sc-if value=\"{{ notSearching }}\" hint-placeholder-val=\"{{ true }}\">\n  <section id=\"about-labda\" style=\"padding:clamp(34px,4.4vw,58px) clamp(18px,5vw,56px);border-top:1px solid #ddd4c2;\">\n    <div style=\"display:grid;grid-template-columns:minmax(0,1.55fr) minmax(0,0.55fr);gap:clamp(36px,5vw,80px);align-items:center;max-width:1360px;\" data-about=\"\">\n      <div>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:600;letter-spacing:.09em;color:#2a7a3f;margin-bottom:10px;\">WHAT IS LABDA?<\u002Fdiv>\n        <h2 style=\"font-family:Syne,sans-serif;font-weight:700;font-size:clamp(22px,2.7vw,32px);line-height:1.14;color:#1f5130;letter-spacing:-.01em;margin-bottom:14px;\">Learning Network for Advanced Behavioural Data Analysis<\u002Fh2>\n        <p style=\"font-size:clamp(15px,1.4vw,16.5px);line-height:1.62;color:#46505f;max-width:640px;\">LABDA is an EU-funded Marie Skłodowska-Curie doctoral network advancing methods to analyse <strong style=\"color:#2d3748;font-weight:600;\">24/7 movement behaviour<\u002Fstrong> from wearable sensors. Its doctoral fellows build novel analysis methods and gather them here as an open toolbox — so any researcher can find the right code tool or resource for their question.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:12px;width:100%;\">\n        <div style=\"background:#fff;border:1px solid #e6e0d2;border-radius:16px;aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;padding:22px;\" data-labdamark=\"\">\n          <img src=\"437e729b-75b2-42ac-ac04-130278f9f789\" alt=\"LABDA\" style=\"max-width:100%;max-height:100%;width:auto;height:auto;display:block;\">\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:12px;\">\n          <div style=\"flex:1;background:#fff;border:1px solid #e6e0d2;border-radius:13px;padding:15px 16px;\">\n            <div style=\"font-family:Syne,sans-serif;font-weight:800;font-size:26px;color:#2a7a3f;line-height:1;\">13<\u002Fdiv>\n            <div style=\"font-size:12px;color:#8a8772;margin-top:5px;font-weight:500;\">doctoral fellows<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:1;background:#fff;border:1px solid #e6e0d2;border-radius:13px;padding:15px 16px;\">\n            <div style=\"font-family:Syne,sans-serif;font-weight:800;font-size:26px;color:#00B4A6;line-height:1;\">7<\u002Fdiv>\n            <div style=\"font-size:12px;color:#8a8772;margin-top:5px;font-weight:500;\">countries<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e6e0d2;border-radius:13px;padding:14px 16px;display:flex;align-items:center;gap:11px;\">\n          <span style=\"display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:9px;background:#e0efe4;color:#2a7a3f;flex:none;\">\n            <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M3 12h18M12 3c2.5 2.5 3.8 5.7 3.8 9S14.5 18.5 12 21M12 3C9.5 5.5 8.2 8.7 8.2 12s1.3 6.5 3.8 9\"><\u002Fpath><\u002Fsvg>\n          <\u002Fspan>\n          <div>\n            <div style=\"font-size:13px;font-weight:600;color:#2d3748;line-height:1.25;\">Horizon Europe · MSCA<\u002Fdiv>\n            <div style=\"font-size:11.5px;color:#8a8772;\">Open-source · maintained by Fellows<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n  <\u002Fsc-if>\n\n  <!-- ===================== TYPE SECTIONS (Code / Resources) ===================== -->\n  <sc-for list=\"{{ sections }}\" as=\"sec\" hint-placeholder-count=\"2\">\n    <sc-if value=\"{{ sec.show }}\" hint-placeholder-val=\"{{ true }}\">\n    <section id=\"{{ sec.id }}\" data-screen-label=\"{{ sec.label }}\" style=\"background:{{ sec.bg }};padding:clamp(34px,4.5vw,60px) clamp(18px,5vw,56px);scroll-margin-top:78px;\">\n      <div style=\"max-width:1360px;\">\n        <div style=\"display:flex;align-items:center;gap:11px;margin-bottom:8px;\">\n          <span style=\"display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:11px;background:{{ sec.soft }};color:{{ sec.accent }};flex:none;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:15px;\">{{ sec.glyph }}<\u002Fspan>\n          <h2 style=\"font-family:Syne,sans-serif;font-weight:700;font-size:clamp(23px,2.8vw,34px);line-height:1.1;color:{{ sec.dark }};letter-spacing:-.01em;\">{{ sec.title }}<\u002Fh2>\n          <span style=\"font-size:13px;font-weight:600;color:{{ sec.chipText }};background:{{ sec.chipBg }};padding:3px 11px;border-radius:20px;\">{{ sec.count }}<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-size:14.5px;line-height:1.55;color:#5a6472;max-width:640px;margin-bottom:24px;\">{{ sec.blurb }}<\u002Fp>\n\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:18px;\">\n          <sc-for list=\"{{ sec.items }}\" as=\"it\" hint-placeholder-count=\"6\">\n            <div onclick=\"{{ it.openThis }}\" role=\"button\" tabindex=\"0\" style=\"display:flex;flex-direction:column;height:100%;background:{{ it.bodyBg }};border:1px solid {{ it.a.cardBorder }};border-radius:14px;overflow:hidden;box-sizing:border-box;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.03);transition:transform .18s ease,box-shadow .18s ease;\" style-hover=\"transform:translateY(-4px);box-shadow:0 16px 32px rgba(0,0,0,.12)\">\n              <sc-if value=\"{{ it.isCode }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between;padding:9px 13px;background:{{ it.a.bar }};\">\n                  <span style=\"display:flex;gap:5px;\">\n                    <span style=\"width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.7);\"><\u002Fspan>\n                    <span style=\"width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.45);\"><\u002Fspan>\n                    <span style=\"width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.3);\"><\u002Fspan>\n                  <\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ it.isResource }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"height:3px;background:{{ it.a.accent }};\"><\u002Fdiv>\n              <\u002Fsc-if>\n              <div style=\"display:flex;flex-direction:column;flex:1;padding:15px 17px 14px;\">\n                <a href=\"{{ it.link }}\" onclick=\"{{ stop }}\" style=\"font-family:Syne,Inter,sans-serif;font-size:18px;font-weight:700;color:{{ it.a.dark }};text-decoration:none;line-height:1.2;word-break:break-word;\">{{ it.title }}<\u002Fa>\n                <p style=\"font-size:13px;line-height:1.5;color:#46505f;margin:5px 0 9px;\">{{ it.tagline }}<\u002Fp>\n                <div style=\"font-size:11.5px;color:#8a8772;margin-bottom:12px;\">by {{ it.author }}<\u002Fdiv>\n\n                <sc-if value=\"{{ it.hasUsers }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"margin-bottom:11px;\">\n                  <div style=\"font-size:9.5px;font-weight:700;letter-spacing:.1em;color:#9a917c;text-transform:uppercase;margin-bottom:5px;\">For<\u002Fdiv>\n                  <div style=\"display:flex;flex-wrap:wrap;gap:6px;\">\n                    <sc-for list=\"{{ it.intendedUser }}\" as=\"u\" hint-placeholder-count=\"2\">\n                      <span style=\"font-size:11px;font-weight:600;color:{{ it.a.chipText }};background:{{ it.a.soft }};padding:3px 10px;border-radius:20px;\">{{ u }}<\u002Fspan>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <\u002Fsc-if>\n\n                <sc-if value=\"{{ it.hasTags }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"display:flex;flex-wrap:wrap;gap:6px;margin-bottom:13px;\">\n                  <sc-for list=\"{{ it.tags }}\" as=\"t\" hint-placeholder-count=\"2\">\n                    <span style=\"font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#7d8a83;background:#f4f2ea;border:1px solid #e8e3d6;padding:2px 8px;border-radius:6px;\">#{{ t }}<\u002Fspan>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n                <\u002Fsc-if>\n\n                <div style=\"border-top:1px solid #eee7d8;padding-top:11px;display:flex;align-items:center;justify-content:flex-end;margin-top:auto;\">\n                  <span style=\"flex:none;display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:600;color:{{ it.a.chipText }};background:{{ it.a.chipBg }};padding:5px 12px;border-radius:20px;\">{{ it.ctaLabel }} ↗<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n    <\u002Fsc-if>\n  <\u002Fsc-for>\n\n  <!-- ===================== ABOUT / CTA ===================== -->\n  <section id=\"about\" style=\"background:#1f5130;color:#fff;padding:clamp(44px,6vw,80px) clamp(18px,5vw,56px);\">\n    <div style=\"display:grid;grid-template-columns:1.3fr .7fr;gap:40px;align-items:center;max-width:1100px;\" data-about=\"\">\n      <div>\n        <h2 style=\"font-family:Syne,sans-serif;font-weight:800;font-size:clamp(26px,3.4vw,40px);line-height:1.18;margin-bottom:16px;\">A signpost, not an archive.<\u002Fh2>\n        <p style=\"font-size:clamp(15px,1.5vw,17px);line-height:1.6;color:#dceee4;max-width:560px;\">The LABDA Toolbox links you straight to the live repositories and hosted resources built by Fellows — so tools stay maintained where they live, and you always reach the current version.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:12px;\">\n        <a href=\"{{ githubUrl }}\" style=\"display:inline-flex;align-items:center;justify-content:center;gap:8px;font-size:15px;font-weight:700;color:#1f5130;background:#fff;text-decoration:none;padding:15px 22px;border-radius:12px;transition:background .15s ease;\" style-hover=\"background:#e6f4ee\">Browse the GitHub organisation ↗<\u002Fa>\n        <a href=\"https://labda-project.eu\" style=\"display:inline-flex;align-items:center;justify-content:center;gap:8px;font-size:15px;font-weight:600;color:#fff;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.25);text-decoration:none;padding:15px 22px;border-radius:12px;transition:background .15s ease;\" style-hover=\"background:rgba(255,255,255,.2)\">Visit labda-project.eu ↗<\u002Fa>\n        <a href=\"#top\" style=\"display:inline-flex;align-items:center;justify-content:center;gap:8px;font-size:14px;font-weight:600;color:#cfe9df;text-decoration:none;padding:10px;\">Contribute a tool →<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer style=\"background:#163a23;color:#a9c9b6;padding:34px clamp(18px,5vw,56px);display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap;\">\n    <div style=\"display:flex;align-items:baseline;gap:9px;\">\n      <span style=\"font-family:Syne,sans-serif;font-weight:800;font-size:16px;color:#fff;\">LABDA<\u002Fspan>\n      <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#7fae93;\">/ TOOLBOX<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"font-size:12px;line-height:1.6;color:#7fae93;max-width:520px;\">Funded by the European Union (MSCA Doctoral Network, Horizon Europe). Views and opinions expressed are those of the authors only.<\u002Fdiv>\n  <\u002Ffooter>\n\n  <!-- ===================== DETAIL DRAWER ===================== -->\n  <sc-if value=\"{{ drawerOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeDrawer }}\" style=\"position:fixed;inset:0;z-index:100;background:rgba(20,40,28,.46);display:flex;justify-content:flex-end;animation:lboverlay .2s ease;\">\n      <div onclick=\"{{ stop }}\" data-drawer-panel=\"\" style=\"width:min(480px,94vw);height:100%;background:#fff;box-shadow:-24px 0 70px rgba(0,0,0,.28);overflow-y:auto;animation:lbslidein .28s cubic-bezier(.22,1,.36,1);\">\n        <div style=\"position:sticky;top:0;z-index:2;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:18px 22px;background:{{ d.headBg }};border-bottom:1px solid {{ d.headBorder }};\">\n          <span style=\"display:inline-flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.08em;color:{{ d.badgeColor }};background:{{ d.badgeBg }};padding:5px 11px;border-radius:7px;\">{{ d.badgeText }}<\u002Fspan>\n          <button onclick=\"{{ closeDrawer }}\" aria-label=\"Close\" style=\"width:34px;height:34px;display:inline-flex;align-items:center;justify-content:center;border:none;background:transparent;color:#5a6472;font-size:22px;line-height:1;cursor:pointer;border-radius:8px;transition:background .15s ease;\" style-hover=\"background:rgba(0,0,0,.06)\">×<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"padding:24px 26px 30px;\">\n          <h2 style=\"font-family:Syne,sans-serif;font-weight:700;font-size:24px;line-height:1.15;color:{{ d.titleColor }};letter-spacing:-.01em;margin-bottom:8px;\">{{ d.title }}<\u002Fh2>\n          <div style=\"font-size:12.5px;color:#7d8a83;margin-bottom:8px;\">by <span style=\"color:#2a7a3f;font-weight:600;\">{{ d.author }}<\u002Fspan><\u002Fdiv>\n          <p style=\"font-size:14.5px;line-height:1.5;color:#46505f;padding-bottom:18px;margin-bottom:20px;border-bottom:1px solid #ece6d8;\">{{ d.subtitle }}<\u002Fp>\n\n          <div style=\"font-size:10px;font-weight:700;letter-spacing:.1em;color:{{ d.accent }};text-transform:uppercase;margin-bottom:7px;\">Description<\u002Fdiv>\n          <p style=\"font-size:14px;line-height:1.65;color:#3f4b5c;margin-bottom:22px;\">{{ d.description }}<\u002Fp>\n\n          <sc-if value=\"{{ d.hasAudience }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"margin-bottom:22px;\">\n              <div style=\"font-size:10px;font-weight:700;letter-spacing:.1em;color:{{ d.accent }};text-transform:uppercase;margin-bottom:8px;\">Intended user<\u002Fdiv>\n              <div style=\"display:flex;flex-wrap:wrap;gap:7px;\">\n                <sc-for list=\"{{ d.audience }}\" as=\"u\" hint-placeholder-count=\"2\">\n                  <span style=\"font-size:12px;font-weight:600;color:{{ d.badgeColor }};background:{{ d.badgeBg }};border:1px solid {{ d.headBorder }};padding:4px 11px;border-radius:20px;\">{{ u }}<\u002Fspan>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{ d.hasTags }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"margin-bottom:24px;\">\n              <div style=\"font-size:10px;font-weight:700;letter-spacing:.1em;color:{{ d.accent }};text-transform:uppercase;margin-bottom:8px;\">Tags<\u002Fdiv>\n              <div style=\"display:flex;flex-wrap:wrap;gap:7px;\">\n                <sc-for list=\"{{ d.tags }}\" as=\"t\" hint-placeholder-count=\"2\">\n                  <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#7d8a83;background:#f4f2ea;border:1px solid #e8e3d6;padding:3px 9px;border-radius:6px;\">#{{ t }}<\u002Fspan>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <a href=\"{{ d.link }}\" style=\"display:flex;align-items:center;justify-content:center;gap:8px;width:100%;box-sizing:border-box;font-size:15px;font-weight:700;color:#fff;background:{{ d.ctaBg }};text-decoration:none;padding:15px 22px;border-radius:12px;margin-top:6px;transition:filter .15s ease;\" style-hover=\"filter:brightness(.93)\">{{ d.ctaLabel }} ↗<\u002Fa>\n          <div style=\"text-align:center;font-size:11.5px;color:#a89e85;margin-top:11px;\">Opens the live resource — the Toolbox links out, it doesn't host.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{},&quot;heroVariant&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;A&quot;,&quot;B&quot;],&quot;default&quot;:&quot;A&quot;,&quot;tsType&quot;:&quot;'A'|'B'&quot;},&quot;resourceAccent&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;teal&quot;,&quot;green&quot;,&quot;blue&quot;,&quot;purple&quot;,&quot;cyan&quot;,&quot;terracotta&quot;],&quot;default&quot;:&quot;teal&quot;,&quot;tsType&quot;:&quot;'teal'|'green'|'blue'|'purple'|'cyan'|'terracotta'&quot;,&quot;section&quot;:&quot;Theme&quot;},&quot;githubUrl&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;https://github.com&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  state = { drawer: null, query: '' };\n\n  setQuery(v) { this.setState({ query: v }, () => this.scrollToResults()); }\n  onSearchInput(e) { this.setState({ query: e.target.value }); }\n  onSearchKey(e) { if (e.key === 'Enter') { e.preventDefault(); this.scrollToResults(); } }\n  clearSearch() { this.setState({ query: '' }); }\n  scrollToResults() {\n    const el = document.getElementById('search-results');\n    if (el) { const y = el.getBoundingClientRect().top + window.scrollY - 70; window.scrollTo({ top: y, behavior: 'smooth' }); }\n  }\n\n  codePal() { return { accent:'#2a7a3f', dark:'#1f5130', soft:'#e0efe4', chipBg:'#eaf4ef', chipText:'#236534', cardBorder:'#d8e8df', sect:'#f1f7f2', bar:'#21663a', codeBody:'#f7fbf8' }; }\n  resPal()  {\n    const c = this.props.resourceAccent || 'teal';\n    if (c === 'teal') return { accent:'#00B4A6', dark:'#0a6f64', soft:'#d3efeb', chipBg:'#d9f1ed', chipText:'#08857a', cardBorder:'#c4e8e2', sect:'#ecf7f5', deep:'#074b45' };\n    if (c === 'green') return { accent:'#1f5130', dark:'#163a23', soft:'#dde9e0', chipBg:'#e6efe8', chipText:'#1f5130', cardBorder:'#cdddd3', sect:'#eef4ef', deep:'#0f2a19' };\n    if (c === 'purple') return { accent:'#8455a8', dark:'#5e3a7a', soft:'#efe5f5', chipBg:'#efe6f6', chipText:'#6f4790', cardBorder:'#e6d9ee', sect:'#f6f1fa', deep:'#45285d' };\n    if (c === 'terracotta') return { accent:'#c0703a', dark:'#8f4f24', soft:'#f6e6da', chipBg:'#f6e9dd', chipText:'#a85f2e', cardBorder:'#ecdcc9', sect:'#faf3ec', deep:'#6b3a1a' };\n    if (c === 'cyan') return { accent:'#0e89a8', dark:'#0a5e72', soft:'#d4eef4', chipBg:'#ddeef3', chipText:'#0a6e86', cardBorder:'#cce6ee', sect:'#edf6f8', deep:'#073d4c' };\n    return { accent:'#4f6bbf', dark:'#34488a', soft:'#e4e8f7', chipBg:'#e8ebf7', chipText:'#41599f', cardBorder:'#d8def2', sect:'#f0f1fa', deep:'#26356a' };\n  }\n\n  openDrawer(item, pal) { this.setState({ drawer: { item, pal } }); }\n  closeDrawer() { this.setState({ drawer: null }); }\n\n  buildDrawer() {\n    const dr = this.state.drawer;\n    if (!dr) return null;\n    const it = dr.item, a = dr.pal;\n    return {\n      headBg: a.sect, headBorder: a.cardBorder,\n      badgeColor: a.chipText, badgeBg: a.soft, badgeText: it.typeLabel,\n      accent: a.accent, titleColor: a.dark, ctaBg: a.accent,\n      subtitle: it.tagline, title: it.title, author: it.author,\n      description: it.description,\n      hasAudience: (it.intendedUser || []).length > 0, audience: it.intendedUser || [],\n      hasTags: (it.tags || []).length > 0, tags: it.tags || [],\n      link: it.link, ctaLabel: it.ctaLabel,\n    };\n  }\n\n  componentDidMount() { this.loadCSV(); }\n\n  parseCSV(text) {\n    const rows = []; let i = 0, field = '', row = [], inQ = false;\n    while (i < text.length) {\n      const c = text[i];\n      if (inQ) {\n        if (c === '\"') { if (text[i + 1] === '\"') { field += '\"'; i += 2; continue; } inQ = false; i++; continue; }\n        field += c; i++; continue;\n      }\n      if (c === '\"') { inQ = true; i++; continue; }\n      if (c === ',') { row.push(field); field = ''; i++; continue; }\n      if (c === '\\r') { i++; continue; }\n      if (c === '\\n') { row.push(field); rows.push(row); row = []; field = ''; i++; continue; }\n      field += c; i++;\n    }\n    if (field.length || row.length) { row.push(field); rows.push(row); }\n    return rows;\n  }\n\n  rowsToObj(rows) {\n    if (!rows.length) return [];\n    const head = rows[0]; const out = [];\n    for (let r = 1; r < rows.length; r++) {\n      if (rows[r].length === 1 && rows[r][0] === '') continue;\n      const o = {}; head.forEach((h, ci) => { o[h.trim()] = rows[r][ci] != null ? rows[r][ci] : ''; });\n      out.push(o);\n    }\n    return out;\n  }\n\n  async loadCSV() {\n    try {\n      const res = await fetch('tools.csv');\n      if (!res.ok) throw new Error('csv not found');\n      const rows = this.rowsToObj(this.parseCSV(await res.text()));\n      const split = (v) => (v || '').split('|').map((s) => s.trim()).filter(Boolean);\n      const items = rows.map((o) => ({\n        type: (o.type || '').toLowerCase() === 'code' ? 'code' : 'resource',\n        title: o.title, tagline: o.tagline, author: o.author,\n        description: o.description, intendedUser: split(o.intendedUser),\n        tags: split(o.tags), link: o.link,\n      }));\n      this.setState({ csv: items });\n    } catch (e) { /* keep embedded fallback */ }\n  }\n\n  // Fallback test data — mirrors tools.csv (6 code + 6 resources).\n  embeddedItems() {\n    return [\n      { type: 'code', title: 'ENMOkit', tagline: 'Computes ENMO, MAD and intensity-gradient metrics from raw acceleration at configurable epochs.', author: 'P. Andersson', description: 'Reimplementing standard metrics leads to subtle, study-breaking differences. After QC, to derive comparable movement metrics. Outputs: Epoch-level ENMO/MAD time series + daily summaries.', intendedUser: ['Researchers', 'Data scientists'], tags: ['signal-processing', 'Python', 'open-source'], link: '#' },\n      { type: 'code', title: 'PolicySim', tagline: 'Simulates population health impact of activity-shift scenarios.', author: 'H. Bauer', description: 'Policy teams need scenario estimates, not just associations. For \"what if the population moved more\" projections. Outputs: Projected outcome shifts under scenarios.', intendedUser: ['Researchers', 'Statisticians'], tags: ['policy', 'R', 'open-source'], link: '#' },\n      { type: 'code', title: 'epochr', tagline: 'Flexible re-epoching and cut-point application across multiple metric definitions.', author: 'J. Lindqvist', description: 'Comparing cut-points means rerunning whole pipelines. During sensitivity analysis of intensity thresholds. Outputs: Activity intensity classifications per epoch.', intendedUser: ['Researchers', 'Statisticians'], tags: ['signal-processing', 'R', 'open-source'], link: '#' },\n      { type: 'code', title: 'wearQC', tagline: 'Automated quality-control flags for non-wear, calibration drift and clipping in free-living data.', author: 'S. Novak', description: 'Unflagged poor-quality segments bias downstream metrics. Immediately after ingestion, before deriving any activity metrics. Outputs: Per-window quality flags + a participant-level QC report.', intendedUser: ['Researchers', 'Data scientists'], tags: ['acquisition', 'Python', 'open-source'], link: '#' },\n      { type: 'code', title: 'DeviceSync', tagline: 'Aligns multi-sensor wearable streams (accelerometer, PPG, GPS) to a shared clock.', author: 'A. Kovač', description: 'Sensors drift and start at different times, breaking fusion. When combining two or more devices per participant. Outputs: Time-aligned long-format dataset with offset diagnostics.', intendedUser: ['Researchers', 'Statisticians'], tags: ['acquisition', 'R', 'open-source'], link: '#' },\n      { type: 'code', title: 'ActiPlot', tagline: 'Publication-ready actigraphy heatmaps and 24-hour radial plots.', author: 'F. Klein', description: 'Raw plots rarely meet publication standards. When preparing figures for papers or reports. Outputs: High-resolution figures + reusable plot configs.', intendedUser: ['Researchers', 'Data scientists'], tags: ['visualisation', 'Python', 'open-source'], link: '#' },\n      { type: 'resource', title: 'Translating accelerometer evidence into public-health guidance', tagline: 'A pathway from device-measured evidence to actionable recommendations.', author: 'Bauer et al., 2024', description: 'Use the pathway to structure an evidence-to-guidance project. Keeps recommendations traceable to underlying data. For example: Framed a national activity guideline update. Limitations: Process-focused; not a substitute for expert panels.', intendedUser: ['Policy makers', 'Researchers'], tags: ['policy', 'Framework'], link: '#' },\n      { type: 'resource', title: 'Best practices for free-living accelerometer data collection', tagline: 'A practical checklist for placement, wear protocols and metadata capture in field studies.', author: 'Haugen et al., 2024', description: 'Adopt the checklist when writing your data-collection protocol. Reduces avoidable data loss and harmonises studies across the network. For example: Used to standardise wear protocols across three cohort sites. Limitations: Focused on wrist and thigh placement; hip guidance is lighter.', intendedUser: ['Researchers', 'Study coordinators'], tags: ['acquisition', 'Protocol'], link: '#' },\n      { type: 'resource', title: 'From data to policy: a framework for movement behaviour recommendations', tagline: 'Connects analysis outputs to the needs of decision-makers.', author: 'Bauer & Sato, 2023', description: 'Align outputs to decision questions early. Reduces the research-to-policy translation gap. For example: Used to brief a municipal health team. Limitations: Assumes some analytic capacity in the audience.', intendedUser: ['Policy makers', 'Practitioners'], tags: ['policy', 'Framework'], link: '#' },\n      { type: 'resource', title: 'Defining behavioural archetypes from wearable data', tagline: 'Practical steps and pitfalls when labelling movement archetypes.', author: 'Ahmed & Costa, 2022', description: 'Follow the validation steps before naming clusters. Encourages reproducible, interpretable phenotypes. For example: Used to standardise archetype reporting in two studies. Limitations: Cluster counts remain somewhat data-driven.', intendedUser: ['Researchers', 'Analysts'], tags: ['phenotyping', 'Guidance'], link: '#' },\n      { type: 'resource', title: 'Mendelian randomisation with device-measured physical activity', tagline: 'Using genetic instruments to probe causality in activity–health links.', author: 'Romano, 2023', description: 'Check instrument validity before applying MR. Offers a complementary route around confounding. For example: Applied to activity and cardiometabolic outcomes. Limitations: Requires large genotyped samples and valid instruments.', intendedUser: ['Researchers', 'Epidemiologists'], tags: ['health-outcomes', 'Methods'], link: '#' },\n      { type: 'resource', title: 'Movement phenotypes across the life course: a scoping review', tagline: 'Surveys how behavioural phenotypes are defined and used across ages.', author: 'Costa et al., 2024', description: 'Position your phenotyping approach against existing definitions. Prevents reinventing incompatible phenotype schemes. For example: Framed phenotype definitions for a youth activity study. Limitations: Coverage is lighter for clinical populations.', intendedUser: ['Researchers'], tags: ['phenotyping', 'Review'], link: '#' },\n    ];\n  }\n\n  // Flat item list (CSV when loaded, embedded otherwise), decorated for the view.\n  getItems() {\n    const raw = this.state.csv || this.embeddedItems();\n    return raw.map((it) => {\n      const isCode = it.type === 'code';\n      return Object.assign({}, it, {\n        type: isCode ? 'code' : 'resource',\n        typeLabel: isCode ? '<\u002F> CODE TOOL' : '▤ RESOURCE',\n        ctaLabel: 'More details',\n      });\n    });\n  }\n\n  renderVals() {\n    const variant = this.props.heroVariant || 'A';\n    const codePal = this.codePal(), resPal = this.resPal();\n    const items = this.getItems();\n    const q = (this.state.query || '').trim().toLowerCase();\n    const searching = q.length > 0;\n\n    const hay = (it) => [it.title, it.tagline, it.author, it.description, (it.intendedUser || []).join(' '), (it.tags || []).join(' ')].join(' ').toLowerCase();\n    const keep = (it) => (!searching || hay(it).includes(q));\n\n    const toVM = (it, pal) => Object.assign({}, it, {\n      a: pal,\n      isCode: it.type === 'code',\n      isResource: it.type !== 'code',\n      bodyBg: it.type === 'code' ? pal.codeBody : '#fff',\n      hasUsers: (it.intendedUser || []).length > 0,\n      hasTags: (it.tags || []).length > 0,\n      openThis: () => this.openDrawer(it, pal),\n    });\n\n    const kept = items.filter(keep);\n    const code = kept.filter((it) => it.type === 'code').map((it) => toVM(it, codePal));\n    const res = kept.filter((it) => it.type !== 'code').map((it) => toVM(it, resPal));\n    const resultCount = code.length + res.length;\n\n    const sections = [\n      { id: 'code-tools', label: 'Code Tools', title: 'Code Tools', glyph: '<\u002F>',\n        blurb: 'Runnable software built by Fellows — readers, metric engines, classifiers and dashboards. Each card links to its live repository.',\n        accent: codePal.accent, dark: codePal.dark, soft: codePal.soft, chipBg: codePal.chipBg, chipText: codePal.chipText, bg: codePal.sect,\n        items: code, count: code.length, show: code.length > 0 },\n      { id: 'resources', label: 'Resources', title: 'Resources', glyph: '▤',\n        blurb: 'Papers, protocols, reviews and guidance on movement-behaviour topics — the reading behind the methods. A code tool may also have a paper here.',\n        accent: resPal.accent, dark: resPal.dark, soft: resPal.soft, chipBg: resPal.chipBg, chipText: resPal.chipText, bg: resPal.sect,\n        items: res, count: res.length, show: res.length > 0 },\n    ];\n\n    const resultLabel = resultCount + (resultCount === 1 ? ' result for “' : ' results for “') + this.state.query.trim() + '”';\n\n    return {\n      isA: variant === 'A',\n      isB: variant === 'B',\n      sections,\n      query: this.state.query,\n      searching, notSearching: !searching,\n      resultCount, resultLabel, noResults: searching && resultCount === 0,\n      onSearchInput: (e) => this.onSearchInput(e),\n      onSearchKey: (e) => this.onSearchKey(e),\n      clearSearch: () => this.clearSearch(),\n      goToResults: () => this.scrollToResults(),\n      githubUrl: this.props.githubUrl || 'https://github.com',\n      signBg: resPal.dark, footBg: resPal.deep, signBtnColor: resPal.dark,\n      exampleChips: ['ENMO', 'sleep', 'compositional', 'Python'].map((label) => ({ label, apply: () => this.setQuery(label) })),\n      drawerOpen: !!this.state.drawer,\n      d: this.buildDrawer() || {},\n      closeDrawer: () => this.closeDrawer(),\n      stop: (e) => e.stopPropagation(),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
